<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:'Segoe UI';
  background: radial-gradient(circle at 20% 20%, #1e1b4b, transparent 40%),
              radial-gradient(circle at 80% 80%, #0ea5e9, transparent 40%),
              linear-gradient(135deg,#020617,#0f172a,#020617);
  min-height:100dvh;
  display:flex;
  justify-content:center;
  align-items:center;
  overflow:hidden;
}

/* overlay نور نرم */
body::before{
  content:"";
  position:fixed;
  inset:0;
  background:linear-gradient(120deg,rgba(139,92,246,.15),rgba(236,72,153,.1));
  pointer-events:none;
}

/* کانتینر */
.container{
  width:100%;
  max-width:400px;
  padding:20px;
}

/* گلس پیشرفته */
.glass-box{
  background:rgba(255,255,255,0.06);
  backdrop-filter:blur(30px);
  border-radius:24px;
  padding:30px 22px;
  box-shadow:
    0 20px 60px rgba(0,0,0,0.6),
    inset 0 0 0 1px rgba(255,255,255,0.05);
}

/* عنوان */
h2{
  color:#fff;
  margin-bottom:25px;
  text-align:center;
  font-size:20px;
}

/* فرم */
.form-group{
  margin-bottom:18px;
}

label{
  color:#aaa;
  font-size:12px;
}

/* اینپوت حرفه‌ای */
input{
  width:100%;
  padding:13px;
  border-radius:12px;
  border:1px solid rgba(255,255,255,0.05);
  margin-top:6px;
  background:rgba(255,255,255,0.04);
  color:#fff;
  transition:.25s;
}

input:focus{
  outline:none;
  border-color:#8b5cf6;
  box-shadow:0 0 0 2px rgba(139,92,246,.25);
  background:rgba(255,255,255,0.06);
}

/* گوگل */
.google-btn{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:10px;
  padding:13px;
  border-radius:14px;
  background:rgba(255,255,255,0.9);
  color:#111;
  font-weight:600;
  cursor:pointer;
  margin-top:25px;
  transition:.25s;
}

.google-btn:hover{
  transform:translateY(-2px);
}

.google-btn img{
  width:20px;
}

/* دکمه اصلی */
.cta-btn{
  width:100%;
  margin-top:22px;
  padding:15px;
  border:none;
  border-radius:16px;
  background:linear-gradient(90deg,#8b5cf6,#ec4899,#22d3ee);
  background-size:200% 200%;
  color:#fff;
  font-weight:bold;
  font-size:15px;
  cursor:pointer;
  transition:.4s;
  box-shadow:0 10px 35px rgba(139,92,246,.5);
}

.cta-btn:hover{
  background-position:100% 0;
  transform:translateY(-2px);
  box-shadow:0 15px 40px rgba(236,72,153,.5);
}

.cta-btn:disabled{
  opacity:.4;
  cursor:not-allowed;
  box-shadow:none;
}

/* لینک */
.login-link{
  text-align:center;
  color:#a78bfa;
  cursor:pointer;
  margin-top:18px;
  font-size:13px;
}

/* نور موس بهتر */
.mouse-glow{
  position:fixed;
  width:300px;
  height:300px;
  border-radius:50%;
  pointer-events:none;
  background:radial-gradient(circle,rgba(139,92,246,.25),transparent 70%);
  filter:blur(20px);
  transform:translate(-50%,-50%);
}

/* پارتیکل نرم‌تر */
.particle{
  position:fixed;
  width:5px;
  height:5px;
  background:linear-gradient(45deg,#8b5cf6,#22d3ee);
  border-radius:50%;
  opacity:.7;
  animation:floatUp 7s linear infinite;
}

@keyframes floatUp{
  from{transform:translateY(0) scale(.8);opacity:0;}
  20%{opacity:1;}
  to{transform:translateY(-140px) scale(1.2);opacity:0;}
}

@media(max-width:480px){
  .glass-box{
    padding:22px 16px;
  }
}
</style>
</head>

<body>

<div class="container">

  <div class="glass-box">

    <h2>ثبت نام توی سالی چت</h2>

    <div class="form-group">
      <label>نام کاربریت چی بود؟</label>
      <input id="user" placeholder="@Amir">
    </div>

    <div class="form-group">
      <label>رمز عبورتم بزن لطفن</label>
      <input id="pass" type="password">
    </div>

    <div class="google-btn" onclick="loginWithGoogle()">
      <img src="https://www.svgrepo.com/show/475656/google-color.svg">
      ثبت‌نام با گوگل
    </div>

    <button id="btn" class="cta-btn" disabled>ثبت‌نام</button>

    <p class="login-link" onclick="location.href='SaliChat_SignUp_Final.html'">
      قبلاً ثبت‌نام کردی؟ پس بزن روم
    </p>

  </div>

</div>

<script>
// input validation
const user = document.getElementById('user');
const pass = document.getElementById('pass');
const btn = document.getElementById('btn');

function check(){
  btn.disabled = !(user.value.trim() && pass.value.trim());
}
user.addEventListener('input', check);
pass.addEventListener('input', check);

// mouse glow
const glow = document.createElement('div');
glow.className = 'mouse-glow';
document.body.appendChild(glow);

document.addEventListener('mousemove', e=>{
  glow.style.left = e.clientX + 'px';
  glow.style.top = e.clientY + 'px';
});

// particles
setInterval(()=>{
  const p = document.createElement('div');
  p.className='particle';
  p.style.left = Math.random()*window.innerWidth+'px';
  p.style.top = window.innerHeight+'px';
  document.body.appendChild(p);
  setTimeout(()=>p.remove(),6000);
},200);

// submit normal
btn.addEventListener('click', ()=>{
  if(!btn.disabled){
    localStorage.setItem("login", true);
    location.href = "home.html";
  }
});
</script>

<!-- Firebase -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyBjGet-li1hqCmkd7OZkkv5e3GEJ_Zp18M",
  authDomain: "salichattest.firebaseapp.com",
  projectId: "salichattest",
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const provider = new GoogleAuthProvider();

window.loginWithGoogle = async function () {
  try {
    const result = await signInWithPopup(auth, provider);
    const user = result.user;

    localStorage.setItem("login", true);
    location.href = "home.html";

  } catch (error) {
    alert("خطا در ورود با گوگل");
  }
};
</script>

</body>
</html>
